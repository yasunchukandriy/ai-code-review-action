name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify dist
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::dist/index.js not found after build"
            exit 1
          fi
          echo "Build output size: $(wc -c < dist/index.js) bytes"
